{% extends 'store/base.html' %}
{% block content %}
<div style="min-height:80vh; display:flex; align-items:center; padding:40px 0;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card p-4 p-md-5">
                    <div class="text-center mb-4">
                        <div style="width:60px;height:60px;background:#1a1a2e;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 15px;">
                            <i class="fa fa-user-plus" style="color: white;font-size:1.4rem;"></i>
                        </div>
                        <h3 style="font-weight:800;color:#1a1a2e;">Créer un compte</h3>
                        <p class="text-muted">Rejoignez ShopZone aujourd'hui</p>
                    </div>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label fw-600 small">Nom</label>
                                <input type="text" name="nom" class="form-control" placeholder="Votre nom" required>
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label fw-600 small">Prénom</label>
                                <input type="text" name="prenom" class="form-control" placeholder="Votre prénom" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-600 small">Email</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa fa-envelope"></i></span>
                                <input type="email" name="email" class="form-control" placeholder="votre@email.com" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-600 small">Mot de passe</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa fa-lock"></i></span>
                                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-600 small">Confirmer le mot de passe</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa fa-lock"></i></span>
                                <input type="password" name="password2" class="form-control" placeholder="••••••••" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-accent w-100 py-2" style="border-radius:10px; font-size:1rem; font-weight:700;background-color: #007bff;color: white;">
                            <i class="fa fa-user-plus me-2"></i>Créer mon compte
                        </button>
                    </form>
                    <p class="text-center mt-4 text-muted">Déjà un compte ? <a href="{% url 'connexion' %}" style="color: #007bff; font-weight:600;">Se connecter</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
